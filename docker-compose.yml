services:
  camera:
    profiles: [production]
    image: camera:production
    build:
      context: .
      target: production
      args:
        VERSION: ${VERSION:-dev}
    volumes:
      - ./camera.yaml:/app/camera.yaml:ro
      - ./storage:/data
    environment:
      - CAMERA_STORAGE_PATH=/data/recordings
    restart: unless-stopped

  camera-dev:
    profiles: [development]
    image: camera:development
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - frontend_dist:/app/frontend/dist
      - frontend_node_modules:/app/frontend/node_modules
      - ./storage:/data
    ports:
      - 8080:8080
    environment:
      - VERSION=${VERSION:-dev}
    command: sh -c "cd frontend && yarn install && yarn build && cd .. && go run -ldflags=\"-X main.version=$$VERSION\" ./cmd/camera --config /app/camera.yaml"
    restart: "no"

volumes:
  frontend_dist:
  frontend_node_modules:
