services:
  camera:
    profiles: [production]
    image: camera:production
    build:
      context: .
      target: production
      args:
        VERSION: ${VERSION:-dev}
    volumes:
      - ./camera.yaml:/app/camera.yaml:ro
      - ./storage:/data
    environment:
      - CAMERA_STORAGE_PATH=/data/recordings
    restart: unless-stopped

  camera-dev:
    profiles: [development]
    image: camera:development
    build:
      context: .
      target: development
    user: "${UID}:${GID}"
    volumes:
      - .:/app
      - ./storage:/app/storage
    ports:
      - 8080:8080
    networks:
      camera_net:
        ipv4_address: 10.10.0.45

    environment:
      - VERSION=${VERSION:-dev}
      - GOCACHE=/app/.cache/go-build
      - YARN_CACHE_FOLDER=/app/.cache/yarn
    command: sh -c "cd frontend && yarn install && yarn build && cd .. && go run -ldflags=\"-X main.version=$$VERSION\" ./cmd/camera --config /app/camera.yaml"
    restart: "no"

networks:
  camera_net:
    name: goiabeira
    external: true
