services:
  camera:
    profiles: [production]
    image: jacksonbicalho/os-camera:latest
    build:
      context: .
      target: production
      args:
        VERSION: ${VERSION:-dev}
    network_mode: host
    volumes:
      - ./camera.yaml:/app/camera.yaml:ro
      - ./storage:/data
      # Webcam local (v4l2): /dev visível + acesso aos devices major 81 (video4linux).
      # Funciona quando há webcam e é inócuo quando não há (não quebra o up).
      - /dev:/dev
    device_cgroup_rules:
      - "c 81:* rmw"
    restart: unless-stopped

  camera-dev:
    profiles: [development]
    image: camera:development
    build:
      context: .
      target: development
    network_mode: host
    #user: "${UID}:${GID}"
    volumes:
      - .:/app
      - ./storage:/data
      # Webcam local (v4l2) — ver serviço `camera`.
      - /dev:/dev
      #- frontend_node_modules:/app/frontend/node_modules
    device_cgroup_rules:
      - "c 81:* rmw"
    environment:
      - VERSION=${VERSION:-dev}
      - GOCACHE=/app/.cache/go-build
      - HOME=/tmp
    command: sh -c "cd frontend && yarn build && cd .. && go run -ldflags=\"-X main.version=$$VERSION\" ./cmd/camera --config /app/camera.yaml"
    restart: "no"

  yolo:
    profiles: [yolo]
    build:
      context: ./services/yolo
    volumes:
      - ./storage:/data:ro
      - ./models:/models
    ports:
      - "8001:8001"
    restart: unless-stopped
    shm_size: 4gb

volumes:
  frontend_node_modules:
