services:
  camera:
    profiles: [production]
    image: camera:production
    build:
      context: .
      target: production
    volumes:
      - ./camera.yaml:/app/camera.yaml:ro
      - ./storage:/data/recordings
      - ./storage/logs:/data/logs
    environment:
      - STORAGE_PATH=/data/recordings
    restart: unless-stopped

  camera-dev:
    profiles: [development]
    image: camera:development
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - ./storage:/data/recordings
      - ./storage/logs:/data/logs
    command: go run ./cmd/camera --config /app/camera.yaml
    restart: "no"
