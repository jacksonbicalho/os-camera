name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goarch: [amd64, arm64, arm]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Build frontend
        run: |
          cd frontend
          yarn install --frozen-lockfile
          yarn build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          COMMIT=$(git rev-parse --short HEAD)
          BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X 'main.builtAt=${BUILT_AT}'" \
            -o dist/camera-linux-${{ matrix.goarch }} \
            ./cmd/camera

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: camera-linux-${{ matrix.goarch }}
          path: dist/camera-linux-${{ matrix.goarch }}
          retention-days: 1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum camera-linux-* > checksums.txt
          cat checksums.txt

      - name: Generate grouped release notes
        id: notes
        run: |
          # Ordena por versГЈo semГўntica e exclui a prГіpria tag вЂ” mais robusto
          # que git describe, que pode pular tags em squash merges sequenciais.
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)

          if [[ -n "$PREV_TAG" ]]; then
            RAW_LOG=$(git log "$PREV_TAG..${{ github.ref_name }}" --pretty=format:"%H|%s" --no-merges)
          else
            RAW_LOG=$(git log --pretty=format:"%H|%s" --no-merges)
          fi

          # Develop preserva commits originais; o squash de develop в†’ master
          # inclui PRs que jГЎ saГ­ram em releases anteriores. Extrai PRs jГЎ
          # publicados em PREV_TAG e filtra pra manter sГі os novos.
          PREV_PRS=""
          if [[ -n "$PREV_TAG" ]]; then
            PREV_PRS=$(git show "$PREV_TAG^{commit}" --format="%B" -s 2>/dev/null | grep -oE '#[0-9]+' | sort -u)
          fi

          # Expande squash commits de release: extrai linhas "* feat/fix..." do body.
          # Aceita sГі linhas top-level com PR (#NNN) no final вЂ” descarta lixo
          # interno de squash-de-squash.
          LOG=""
          while IFS="|" read -r hash msg; do
            [[ -z "$hash" ]] && continue
            if [[ "$msg" =~ ^release: ]]; then
              while IFS= read -r bline; do
                if [[ "$bline" =~ ^\*[[:space:]]+([a-z]+(\([^)]+\))?:.+\(#[0-9]+\))[[:space:]]*$ ]]; then
                  text="${BASH_REMATCH[1]}"
                  pr=$(echo "$text" | grep -oE '#[0-9]+' | tail -1)
                  if [[ -n "$pr" && -n "$PREV_PRS" ]] && echo "$PREV_PRS" | grep -qx "$pr"; then
                    continue
                  fi
                  LOG+="$hash|$text"$'\n'
                fi
              done < <(git show "$hash" --format="%b" -s)
            else
              LOG+="$hash|$msg"$'\n'
            fi
          done <<< "$RAW_LOG"

          declare -A SECTIONS=(
            [feat]="вњЁ Novidades"
            [fix]="рџђ› CorreГ§Гµes"
            [perf]="вљЎ Performance"
            [refactor]="в™»пёЏ RefatoraГ§ГЈo"
            [docs]="рџ“љ Docs"
            [test]="рџ§Є Testes"
            [chore]="рџ”§ ManutenГ§ГЈo"
          )

          ORDER=(feat fix perf refactor docs test chore other)

          declare -A OUTPUT
          for k in "${ORDER[@]}"; do OUTPUT[$k]=""; done

          while IFS="|" read -r hash msg; do
            short=${hash:0:7}

            # ignora commits invГЎlidos (ex: merge)
            if [[ ! "$msg" =~ ^(feat|fix|perf|refactor|docs|test|chore) ]]; then
              continue
            fi

            type=$(echo "$msg" | sed -E 's/^([a-z]+).*/\1/')
            scope=$(echo "$msg" | sed -nE 's/^[a-z]+\(([^)]+)\).*/\1/p')
            text="${msg#*: }"

            [[ "$msg" =~ !: ]] && text="$text вљ  BREAKING"

            if [[ -n "$scope" ]]; then
              line="- **$scope**: $text (\`$short\`)"
            else
              line="- $text (\`$short\`)"
            fi

            if [[ -v SECTIONS[$type] ]]; then
              OUTPUT[$type]+="$line"$'\n'
            else
              OUTPUT[other]+="$line"$'\n'
            fi
          done <<< "$LOG"

          CHANGELOG=""

          for k in "${ORDER[@]}"; do
            [[ -z "${OUTPUT[$k]}" ]] && continue
            title="${SECTIONS[$k]:-рџ“¦ Outros}"
            CHANGELOG+="### $title"$'\n'
            CHANGELOG+="${OUTPUT[$k]}"$'\n'
          done

          {
            echo "body<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect pre-release
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ -(beta|alpha|rc)\. ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: |
            dist/camera-linux-amd64
            dist/camera-linux-arm64
            dist/camera-linux-arm
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
