name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goarch: [amd64, arm64, arm]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Build frontend
        run: |
          cd frontend
          yarn install --frozen-lockfile
          yarn build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          COMMIT=$(git rev-parse --short HEAD)
          BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X 'main.builtAt=${BUILT_AT}'" \
            -o dist/camera-linux-${{ matrix.goarch }} \
            ./cmd/camera

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: camera-linux-${{ matrix.goarch }}
          path: dist/camera-linux-${{ matrix.goarch }}
          retention-days: 1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum camera-linux-* > checksums.txt
          cat checksums.txt

      - name: Generate grouped release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")

          if [[ -n "$PREV_TAG" ]]; then
            LOG=$(git log "$PREV_TAG..${{ github.ref_name }}" --pretty=format:"%H|%s" --no-merges)
          else
            LOG=$(git log --pretty=format:"%H|%s" --no-merges)
          fi

          declare -A SECTIONS=(
            [feat]="✨ Novidades"
            [fix]="🐛 Correções"
            [perf]="⚡ Performance"
            [refactor]="♻️ Refatoração"
            [docs]="📚 Docs"
            [test]="🧪 Testes"
            [chore]="🔧 Manutenção"
          )

          ORDER=(feat fix perf refactor docs test chore other)

          declare -A OUTPUT
          for k in "${ORDER[@]}"; do OUTPUT[$k]=""; done

          while IFS="|" read -r hash msg; do
            short=${hash:0:7}

            # ignora commits inválidos (ex: merge)
            if [[ ! "$msg" =~ ^(feat|fix|perf|refactor|docs|test|chore) ]]; then
              continue
            fi

            type=$(echo "$msg" | sed -E 's/^([a-z]+).*/\1/')
            scope=$(echo "$msg" | sed -nE 's/^[a-z]+\(([^)]+)\).*/\1/p')
            text="${msg#*: }"

            [[ "$msg" =~ !: ]] && text="$text ⚠ BREAKING"

            if [[ -n "$scope" ]]; then
              line="- **$scope**: $text (\`$short\`)"
            else
              line="- $text (\`$short\`)"
            fi

            if [[ -v SECTIONS[$type] ]]; then
              OUTPUT[$type]+="$line"$'\n'
            else
              OUTPUT[other]+="$line"$'\n'
            fi
          done <<< "$LOG"

          CHANGELOG=""

          for k in "${ORDER[@]}"; do
            [[ -z "${OUTPUT[$k]}" ]] && continue
            title="${SECTIONS[$k]:-📦 Outros}"
            CHANGELOG+="### $title"$'\n'
            CHANGELOG+="${OUTPUT[$k]}"$'\n'
          done

          {
            echo "body<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect pre-release
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ -(beta|alpha|rc)\. ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: |
            dist/camera-linux-amd64
            dist/camera-linux-arm64
            dist/camera-linux-arm
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
