name: CI

on:
  pull_request:
    branches:
      - master
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Build frontend (required by go:embed)
        run: cd frontend && yarn install --frozen-lockfile && yarn build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install
        run: cd frontend && yarn install --frozen-lockfile

      - name: Lint
        run: cd frontend && yarn lint

      - name: Test
        run: cd frontend && yarn test --run

      - name: Build
        run: cd frontend && yarn build

  yolo:
    name: YOLO service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Os testes stubam torch/ultralytics/cv2 via sys.modules, então só precisam
      # de fastapi/pydantic/pyyaml/httpx/pytest — sem torch/GPU.
      - name: Install test deps
        run: pip install fastapi pydantic pyyaml httpx pytest

      - name: Test
        run: cd services/yolo && python -m pytest -q
