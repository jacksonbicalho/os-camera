name: CI

on:
  pull_request:
    branches:
      - master
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Build frontend (required by go:embed)
        run: cd frontend && yarn install --frozen-lockfile && yarn build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install
        run: cd frontend && yarn install --frozen-lockfile

      - name: Lint
        run: cd frontend && yarn lint

      - name: Test
        run: cd frontend && yarn test --run

      - name: Build
        run: cd frontend && yarn build
